events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    upstream backend_core {
        server backend-core:8000;
    }

    upstream backend_ml {
        server backend-ml:8001;
    }

    server {
        listen 80;
        server_name localhost;

        # Django core routes
        location /api/core/ {
            proxy_pass http://backend_core;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django Admin panel
        location /admin/ {
            proxy_pass http://backend_core;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django static and media files
        location /static/django/ {
            proxy_pass http://backend_core;
            proxy_set_header Host $host;
        }

        # FastAPI ML routes
        location /api/ml/ {
            proxy_pass http://backend_ml;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # FastAPI Swagger documentation UI (Restricted in Production)
        location /docs {
            return 403;
        }

        # OpenAPI schema (Restricted in Production)
        location /openapi.json {
            return 403;
        }

        # Default route (placeholder to backend-core root for greeting)
        location / {
            proxy_pass http://backend_core;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
